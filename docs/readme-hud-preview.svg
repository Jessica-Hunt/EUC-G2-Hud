<svg width="1400" height="1220" viewBox="0 0 1400 1220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">EUC World HUD preview</title>
  <desc id="desc">Illustrated preview of the full and compact Even G2 HUD layouts used by the EUC World plugin.</desc>
  <defs>
    <linearGradient id="bg" x1="160" y1="80" x2="1240" y2="1120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#131826"/>
      <stop offset="1" stop-color="#090B12"/>
    </linearGradient>
    <linearGradient id="cardStroke" x1="180" y1="140" x2="1220" y2="1080" gradientUnits="userSpaceOnUse">
      <stop stop-color="#334155"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000814" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1400" height="1220" fill="url(#bg)"/>
  <circle cx="220" cy="160" r="180" fill="#0F172A" fill-opacity="0.55"/>
  <circle cx="1240" cy="980" r="220" fill="#111827" fill-opacity="0.7"/>

  <text x="120" y="100" fill="#E5EEF9" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="700">EUC World HUD</text>
  <text x="120" y="140" fill="#93A4BC" font-family="Inter, Arial, sans-serif" font-size="22">Full and compact layout previews for the Even G2 ride display</text>

  <rect x="90" y="190" width="1220" height="500" rx="28" fill="#0B1120" stroke="url(#cardStroke)" stroke-width="2" filter="url(#shadow)"/>
  <text x="130" y="245" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700">Full HUD</text>
  <text x="130" y="278" fill="#7DD3FC" font-family="Inter, Arial, sans-serif" font-size="16">Dial + split telemetry panes</text>

  <rect x="120" y="305" width="1036.8" height="344" rx="22" fill="#000000" stroke="#1F2937" stroke-width="2"/>
  <g transform="translate(120 305) scale(1.8)">
    <rect width="576" height="96" fill="#000000"/>
    <rect y="96" width="576" height="76" fill="#000000"/>

    <circle cx="96" cy="58" r="42" stroke="#242424" stroke-width="9" fill="none"/>
    <circle cx="96" cy="58" r="42" stroke="#4A4A4A" stroke-width="9" stroke-linecap="round" fill="none" stroke-dasharray="168 120" transform="rotate(148 96 58)"/>
    <circle cx="63" cy="82" r="5" fill="#FFFFFF"/>
    <circle cx="133" cy="79" r="5" fill="#FFFFFF"/>
    <text x="96" y="58" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="54" font-weight="700" text-anchor="middle" dominant-baseline="middle">37</text>
    <text x="96" y="80" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle">km/h</text>

    <text x="8" y="130" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="18" font-weight="700">MRG 74%   PWR 1940W .</text>
    <text x="210" y="22" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="18" font-weight="700">.</text>

    <text x="298" y="30" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="18" font-weight="700">TRIP 12.64 km</text>
    <text x="298" y="70" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="18" font-weight="700">ODO 1854 km</text>
    <text x="298" y="110" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="18" font-weight="700">BAT 68%   TEMP 32C</text>
    <text x="10" y="182" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="18" font-weight="700">VOLT 82.1V   CURR 23.6A</text>
    <text x="298" y="182" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="18" font-weight="700">PHONE 46%   GLASSES 82%</text>
  </g>

  <rect x="90" y="730" width="1220" height="390" rx="28" fill="#0B1120" stroke="url(#cardStroke)" stroke-width="2" filter="url(#shadow)"/>
  <text x="130" y="785" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700">Compact HUD</text>
  <text x="130" y="818" fill="#7DD3FC" font-family="Inter, Arial, sans-serif" font-size="16">Dial + stacked summary block for simulator-friendly screenshots</text>

  <rect x="120" y="845" width="1036.8" height="252" rx="22" fill="#000000" stroke="#1F2937" stroke-width="2"/>
  <g transform="translate(120 845) scale(1.8)">
    <rect width="576" height="72" fill="#000000"/>

    <circle cx="96" cy="58" r="42" stroke="#242424" stroke-width="9" fill="none"/>
    <circle cx="96" cy="58" r="42" stroke="#4A4A4A" stroke-width="9" stroke-linecap="round" fill="none" stroke-dasharray="150 138" transform="rotate(146 96 58)"/>
    <circle cx="70" cy="88" r="5" fill="#FFFFFF"/>
    <circle cx="127" cy="86" r="5" fill="#FFFFFF"/>
    <text x="96" y="58" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="54" font-weight="700" text-anchor="middle" dominant-baseline="middle">37</text>
    <text x="96" y="80" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle">km/h</text>

    <text x="8" y="130" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="18" font-weight="700">MRG 74%   PWR 1940W .</text>

    <text x="206" y="28" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="16" font-weight="700">TRIP 12.64 km</text>
    <text x="206" y="52" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="16" font-weight="700">ODO 1854 km</text>
    <text x="206" y="76" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="16" font-weight="700">BAT 68%   TEMP 32C</text>
    <text x="206" y="100" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="16" font-weight="700">VOLT 82.1V   CURR 23.6A</text>
    <text x="206" y="124" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="16" font-weight="700">PHONE 46%   GLASSES 82%</text>
  </g>

  <text x="120" y="1170" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="18">Illustrative preview based on the current HUD layout and telemetry formatting.</text>
</svg>
